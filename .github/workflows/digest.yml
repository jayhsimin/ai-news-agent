name: AI News Digest

on:
  schedule:
    # 每 3 小時執行一次（UTC 時間：01/04/07/10/13/16/19/22 點）
    # 對應台灣時間：09/12/15/18/21/24/03/06 點
    - cron: '0 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:
    # 允許在 GitHub Actions 頁面手動觸發（測試用）
    inputs:
      debug:
        description: '是否輸出詳細 log'
        required: false
        default: 'false'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. 取得程式碼 ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 設定 Python 環境 ────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-gha.txt

      # ── 3. 安裝依賴（使用精簡版 requirements）─────────────
      - name: Install dependencies
        run: pip install -r requirements-gha.txt

      # ── 4. 還原去重快取（上次 run 留下的 seen_urls.json）──
      - name: Restore seen URLs cache
        uses: actions/cache/restore@v4
        with:
          path: seen_urls.json
          # restore-keys 會找最近一次符合前綴的快取
          key: seen-urls-v1-${{ github.run_id }}
          restore-keys: |
            seen-urls-v1-

      # ── 5. 執行 Pipeline ───────────────────────────────────
      - name: Run AI News Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Reddit（選填，不設定則跳過 Reddit 採集）
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # 推播門檻（預設 6.0，可在 repo Variables 中覆蓋）
          MIN_RELEVANCE_SCORE: ${{ vars.MIN_RELEVANCE_SCORE || '6.0' }}
          # Groq 模型（選填，預設 llama-3.1-8b-instant）
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.1-8b-instant' }}
          # 去重快取檔案路徑
          SEEN_URLS_PATH: seen_urls.json
          # 讓 Python 找得到專案根目錄的模組（collectors, processors 等）
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/gha_pipeline.py

      # ── 6. 儲存去重快取（無論 pipeline 成功與否都儲存）──────
      - name: Save seen URLs cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_urls.json
          key: seen-urls-v1-${{ github.run_id }}
